# DigitalOcean App Platform spec — Etsy Otomasyon
# TEMPLATE: <...> alanlarını doldurun. Secret değerleri BURAYA YAZMAYIN; DO panelinden
# (App → Settings → Environment Variables) SECRET olarak girin. Bu dosya git'e commit edilir.
#
# Uygulama: tek Web Service (Next.js frontend + API + cron) + bir PRE_DEPLOY job (migration).
# Deploy: doctl apps create --spec .do/app.yaml  (veya panelden "Create from spec").

name: etsy-otomasyon
region: fra # Spaces/DB ile aynı bölge önerilir (fra1)

# ── Tüm bileşenlerce paylaşılan ortam değişkenleri ──────────────────────────────
# type: SECRET olanların DEĞERİ panelde girilir (aşağıda value yok). Diğerleri düz config.
#
# scope: RUN_TIME (BUILD değil) — iki sebep:
#   1) `next build` hiçbir runtime secret'ına ihtiyaç duymaz (env erişimleri tembel;
#      bkz. lib/db/index.ts ve lib/env.ts publicBranding). Secret'sız build doğrulandı.
#   2) Dockerfile build'lerinde BUILD_TIME değişkenleri docker build-arg olarak geçer ve
#      imaj katmanlarına sızabilir. Secret'ları imaja gömmüyoruz.
# NOT: ETSY_SHOP_NAME / CONTACT_EMAIL marketing sayfalarında (statik prerender) kullanılır;
# RUN_TIME olduklarından build'de lib/env.ts'teki DEFAULT_* değerleri gömülür. Değiştirmek
# isterseniz oradaki default'u güncelleyin (yalnızca kozmetik marka metni).
envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    type: SECRET
  - key: DATABASE_SSL
    scope: RUN_TIME
    value: "true"
  # DO Managed PG "CA certificate"ını doğrulamak için (opsiyonel ama önerilir):
  # - key: DATABASE_CA_CERT
  #   scope: RUN_AND_BUILD_TIME
  #   type: SECRET
  - key: TOKEN_ENCRYPTION_KEY
    scope: RUN_TIME
    type: SECRET
  - key: ANTHROPIC_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: FAL_KEY
    scope: RUN_TIME
    type: SECRET
  - key: GOOGLE_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: ETSY_CLIENT_ID
    scope: RUN_TIME
    type: SECRET
  - key: ETSY_CLIENT_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: ETSY_REDIRECT_URI
    scope: RUN_TIME
    value: "https://bbfcreative.com.tr/api/auth/etsy/callback"
  - key: ETSY_SHOP_NAME
    scope: RUN_TIME
    value: "VeloraArtDesigns"
  - key: PUBLIC_BASE_URL
    scope: RUN_TIME
    value: "https://bbfcreative.com.tr"
  # DO Spaces (üretimde ZORUNLU — ephemeral disk yerine kalıcı depolama):
  - key: DO_SPACES_KEY
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: DO_SPACES_BUCKET
    scope: RUN_TIME
    value: "etsy-otomasyon-assets"
  - key: DO_SPACES_REGION
    scope: RUN_TIME
    value: "fra1"
  - key: DO_SPACES_ENDPOINT
    scope: RUN_TIME
    value: "https://fra1.digitaloceanspaces.com"
  - key: COMPETITOR_CRON_ENABLED
    scope: RUN_TIME
    value: "true"
  # PIPELINE_RECOVERY_ENABLED varsayılan açık; kapatmak için "false" verin.

# ── Web Service (Next.js) ───────────────────────────────────────────────────────
services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: bilal-ahmet/e_oto
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1 # cron + fire-and-forget iş → tek instance (advisory lock ileride 2+'ya izin verir)
    # basic-xs (1 GB) YETMİYOR: 5 JPG paketleme adımı 77 megapiksellik pipeline'lar çalıştırıyor.
    # Düzeltmelerden sonra tepe RSS ~200-400 MB'a indi ama Next.js tabanı + ffmpeg + Spaces
    # buffer'ları ile pay bırakmak gerekiyor. basic-s = 2 GB / 1 vCPU.
    instance_size_slug: basic-s
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 15

# ── Pre-Deploy Job (migration) ──────────────────────────────────────────────────
# Her deploy'da yeni kod canlıya geçmeden ÖNCE bekleyen migration'ları uygular.
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    # Web servisiyle AYNI Dockerfile imajı. Buildpack (environment_slug) KULLANMA:
    # node-js buildpack build sonrası devDependency'leri budar ve `tsx` (db:migrate'in
    # çalıştırıcısı) devDependency olduğundan job "tsx: not found" ile düşer.
    dockerfile_path: Dockerfile
    github:
      repo: bilal-ahmet/e_oto
      branch: main
    source_dir: /
    run_command: npm run db:migrate
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

# ── Custom domain ───────────────────────────────────────────────────────────────
domains:
  - domain: bbfcreative.com.tr
    type: PRIMARY
